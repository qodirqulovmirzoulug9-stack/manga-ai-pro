name: Flutter iOS IPA Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Create iOS project and install pods
        run: |
          flutter create . --platforms=ios --project-name=manga_ai
          cd ios
          pod install
          cd ..

      - name: Build Unsigned iOS App
        run: |
          # Sertifikatsiz build qilish
          flutter build ios --release --no-codesign
          
          # IPA faylini qo'lda yaratish (Esign uchun)
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r MangaAI.ipa Payload
          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MangaAI-IPA
          path: build/ios/ipa/MangaAI.ipa
          if-no-files-found: error
          retention-days: 5
